<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Price Target Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0c0f;
    --surface:  #111318;
    --border:   #1e2330;
    --border2:  #2a3044;
    --text:     #c8cdd8;
    --dim:      #5a6070;
    --accent:   #3b82f6;
    --up:       #22d3a0;
    --down:     #f43f5e;
    --neutral:  #94a3b8;
    --mono:     "IBM Plex Mono", monospace;
    --sans:     "IBM Plex Sans", sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    position: sticky;
    top: 0;
    background: rgba(10, 12, 15, 0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .logo {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    letter-spacing: .04em;
    white-space: nowrap;
  }
  .logo span { color: var(--accent); }

  /* ── Controls ── */
  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    flex: 1;
  }
  .search-wrap {
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 9px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--dim);
    pointer-events: none;
  }
  input[type="text"] {
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 6px 10px 6px 30px;
    border-radius: 4px;
    outline: none;
    width: 220px;
    transition: border-color .15s;
  }
  input[type="text"]:focus { border-color: var(--accent); }

  select {
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 4px;
    outline: none;
    cursor: pointer;
    transition: border-color .15s;
  }
  select:focus { border-color: var(--accent); }

  .meta {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--dim);
    white-space: nowrap;
  }
  .meta strong { color: var(--neutral); }

  /* ── Stats bar ── */
  .stats {
    display: flex;
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .stat {
    flex: 1;
    min-width: 120px;
    padding: 10px 20px;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .stat-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .stat-value {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 600;
    color: #fff;
  }
  .stat-value.up   { color: var(--up); }
  .stat-value.down { color: var(--down); }

  /* ── Table ── */
  .table-wrap {
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  thead {
    position: sticky;
    top: 57px;
    z-index: 50;
  }
  th {
    background: var(--surface);
    border-bottom: 1px solid var(--border2);
    padding: 9px 14px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: .08em;
    text-align: left;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: color .15s;
  }
  th:hover { color: var(--text); }
  th.sorted { color: var(--accent); }
  th .sort-arrow { margin-left: 4px; opacity: .6; }

  /* column widths */
  th:nth-child(1)  { width: 100px; }   /* Date */
  th:nth-child(2)  { width: 70px;  }   /* Ticker */
  th:nth-child(3)  { width: 200px; }   /* Company */
  th:nth-child(4)  { width: 130px; }   /* Sector */
  th:nth-child(5)  { width: 180px; }   /* Industry */
  th:nth-child(6)  { width: 90px;  }   /* Action */
  th:nth-child(7)  { width: 160px; }   /* Analyst */
  th:nth-child(8)  { width: 110px; }   /* Rating */
  th:nth-child(9)  { width: 110px; }   /* Prev PT */
  th:nth-child(10) { width: 110px; }   /* New PT */
  th:nth-child(11) { width: 80px;  }   /* Change */

  tr {
    border-bottom: 1px solid var(--border);
    transition: background .1s;
  }
  tbody tr:hover { background: rgba(59,130,246,.05); }

  td {
    padding: 9px 14px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .td-ticker {
    font-weight: 600;
    color: var(--accent);
    letter-spacing: .04em;
  }
  .td-company { color: #e2e8f0; font-family: var(--sans); font-size: 12px; }
  .td-sector  { color: var(--neutral); font-size: 11px; }
  .td-industry{ color: var(--dim); font-size: 11px; }
  .td-date    { color: var(--dim); font-size: 11px; }

  .badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .05em;
    text-transform: uppercase;
  }
  .badge-upgrade   { background: rgba(34,211,160,.12); color: var(--up);   border: 1px solid rgba(34,211,160,.25); }
  .badge-downgrade { background: rgba(244,63,94,.12);  color: var(--down); border: 1px solid rgba(244,63,94,.25); }
  .badge-reiterate { background: rgba(148,163,184,.1); color: var(--neutral); border: 1px solid rgba(148,163,184,.2); }
  .badge-initiated { background: rgba(59,130,246,.12); color: var(--accent); border: 1px solid rgba(59,130,246,.25); }

  .pt-arrow { color: var(--dim); margin: 0 4px; }
  .pt-up   { color: var(--up); font-weight: 600; }
  .pt-down { color: var(--down); font-weight: 600; }

  .chg-up   { color: var(--up);   font-weight: 600; }
  .chg-down { color: var(--down); font-weight: 600; }
  .chg-flat { color: var(--dim); }

  /* ── Empty / Loading ── */
  .state-msg {
    text-align: center;
    padding: 80px 20px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--dim);
  }
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .6s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Pagination ── */
  .pager {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 16px;
    border-top: 1px solid var(--border);
  }
  .pager button {
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .pager button:disabled { opacity: .3; cursor: default; }
  .pager button:not(:disabled):hover { border-color: var(--accent); color: var(--accent); }
  .pager .page-info { font-family: var(--mono); font-size: 12px; color: var(--dim); }
</style>
</head>
<body>

<header>
  <div class="logo">PT<span>.</span>TRACKER</div>
  <div class="controls">
    <div class="search-wrap">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <input type="text" id="search" placeholder="Ticker / Company / Analyst…">
    </div>
    <select id="filter-action">
      <option value="">All Actions</option>
      <option value="upgrade">Upgrade</option>
      <option value="downgrade">Downgrade</option>
      <option value="reiterated">Reiterated</option>
      <option value="initiated">Initiated</option>
    </select>
    <select id="filter-sector">
      <option value="">All Sectors</option>
    </select>
    <select id="filter-pt">
      <option value="">All PT Changes</option>
      <option value="up">PT Raised ↑</option>
      <option value="down">PT Lowered ↓</option>
      <option value="none">No PT Change</option>
    </select>
  </div>
  <div class="meta" id="meta-info">Loading…</div>
</header>

<div class="stats">
  <div class="stat"><div class="stat-label">Total</div><div class="stat-value" id="stat-total">—</div></div>
  <div class="stat"><div class="stat-label">Upgrades</div><div class="stat-value up" id="stat-up">—</div></div>
  <div class="stat"><div class="stat-label">Downgrades</div><div class="stat-value down" id="stat-down">—</div></div>
  <div class="stat"><div class="stat-label">PT Raised</div><div class="stat-value up" id="stat-pt-up">—</div></div>
  <div class="stat"><div class="stat-label">PT Lowered</div><div class="stat-value down" id="stat-pt-down">—</div></div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th data-col="date">Date<span class="sort-arrow">↕</span></th>
        <th data-col="ticker">Ticker<span class="sort-arrow">↕</span></th>
        <th data-col="company">Company<span class="sort-arrow">↕</span></th>
        <th data-col="sector">Sector<span class="sort-arrow">↕</span></th>
        <th data-col="industry">Industry<span class="sort-arrow">↕</span></th>
        <th data-col="action">Action<span class="sort-arrow">↕</span></th>
        <th data-col="analyst">Analyst<span class="sort-arrow">↕</span></th>
        <th>Rating (Prev→New)</th>
        <th data-col="pt_prev">Prev PT<span class="sort-arrow">↕</span></th>
        <th data-col="pt_new">New PT<span class="sort-arrow">↕</span></th>
        <th>Change</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="state-msg" class="state-msg"><span class="spinner"></span>Loading data…</div>
</div>
<div class="pager">
  <button id="btn-prev" disabled>← Prev</button>
  <span class="page-info" id="page-info">—</span>
  <button id="btn-next" disabled>Next →</button>
</div>

<script>
const PAGE_SIZE = 50;
let allData = [];
let filtered = [];
let sortCol = "date";
let sortAsc = false;
let page = 1;

async function loadData() {
  try {
    const res = await fetch("data.json?_=" + Date.now());
    const json = await res.json();
    allData = json.records || [];
    const updAt = json.updated_at
      ? new Date(json.updated_at).toLocaleString("ja-JP", {timeZone:"Asia/Tokyo"})
      : "—";
    document.getElementById("meta-info").innerHTML =
      `Updated: <strong>${updAt} JST</strong> &nbsp;|&nbsp; <strong>${json.total}</strong> records`;
    buildSectorFilter();
    applyFilters();
  } catch(e) {
    document.getElementById("state-msg").textContent = "Failed to load data.json";
    document.getElementById("state-msg").style.display = "block";
  }
}

function buildSectorFilter() {
  const sectors = [...new Set(allData.map(r => r.sector).filter(Boolean))].sort();
  const sel = document.getElementById("filter-sector");
  sectors.forEach(s => {
    const o = document.createElement("option");
    o.value = s; o.textContent = s;
    sel.appendChild(o);
  });
}

function parsePT(s) {
  if (!s) return null;
  const n = parseFloat(s.replace(/[^0-9.]/g, ""));
  return isNaN(n) ? null : n;
}

function applyFilters() {
  const q      = document.getElementById("search").value.toLowerCase();
  const action = document.getElementById("filter-action").value.toLowerCase();
  const sector = document.getElementById("filter-sector").value;
  const ptF    = document.getElementById("filter-pt").value;

  filtered = allData.filter(r => {
    if (q && !`${r.ticker} ${r.company} ${r.analyst}`.toLowerCase().includes(q)) return false;
    if (action && !r.action.toLowerCase().includes(action)) return false;
    if (sector && r.sector !== sector) return false;
    if (ptF) {
      const prev = parsePT(r.pt_prev), next = parsePT(r.pt_new);
      if (ptF === "up"   && !(prev && next && next > prev)) return false;
      if (ptF === "down" && !(prev && next && next < prev)) return false;
      if (ptF === "none" && (prev && next && next !== prev)) return false;
    }
    return true;
  });

  // sort
  filtered.sort((a, b) => {
    let va = a[sortCol] || "", vb = b[sortCol] || "";
    if (sortCol === "pt_prev" || sortCol === "pt_new") {
      va = parsePT(va) ?? -Infinity;
      vb = parsePT(vb) ?? -Infinity;
    }
    if (va < vb) return sortAsc ? -1 :  1;
    if (va > vb) return sortAsc ?  1 : -1;
    return 0;
  });

  updateStats();
  page = 1;
  render();
}

function updateStats() {
  document.getElementById("stat-total").textContent = filtered.length;
  document.getElementById("stat-up").textContent =
    filtered.filter(r => r.action.toLowerCase().includes("upgrade")).length;
  document.getElementById("stat-down").textContent =
    filtered.filter(r => r.action.toLowerCase().includes("downgrade")).length;

  let ptUp = 0, ptDown = 0;
  filtered.forEach(r => {
    const p = parsePT(r.pt_prev), n = parsePT(r.pt_new);
    if (p && n) { if (n > p) ptUp++; else if (n < p) ptDown++; }
  });
  document.getElementById("stat-pt-up").textContent  = ptUp;
  document.getElementById("stat-pt-down").textContent = ptDown;
}

function actionBadge(action) {
  const a = action.toLowerCase();
  if (a.includes("upgrade"))   return `<span class="badge badge-upgrade">Upgrade</span>`;
  if (a.includes("downgrade")) return `<span class="badge badge-downgrade">Downgrade</span>`;
  if (a.includes("initiat"))   return `<span class="badge badge-initiated">Initiated</span>`;
  return `<span class="badge badge-reiterate">${action || "—"}</span>`;
}

function ptChange(prev, next) {
  const p = parsePT(prev), n = parsePT(next);
  if (!p || !n) return `<span class="chg-flat">—</span>`;
  const diff = n - p;
  const pct  = (diff / p * 100).toFixed(1);
  const cls  = diff > 0 ? "chg-up" : diff < 0 ? "chg-down" : "chg-flat";
  const sign = diff > 0 ? "+" : "";
  return `<span class="${cls}">${sign}${pct}%</span>`;
}

function ptCell(val, prev, isNew) {
  if (!val) return `<span style="color:var(--dim)">—</span>`;
  if (!isNew || !prev) return `<span>${val}</span>`;
  const p = parsePT(prev), n = parsePT(val);
  if (!p || !n) return `<span>${val}</span>`;
  const cls = n > p ? "pt-up" : n < p ? "pt-down" : "";
  return `<span class="${cls}">${val}</span>`;
}

function render() {
  const tbody = document.getElementById("tbody");
  const msg   = document.getElementById("state-msg");
  const total = filtered.length;

  if (total === 0) {
    tbody.innerHTML = "";
    msg.style.display = "block";
    msg.textContent = "No matching records.";
    document.getElementById("page-info").textContent = "0 / 0";
    document.getElementById("btn-prev").disabled = true;
    document.getElementById("btn-next").disabled = true;
    return;
  }
  msg.style.display = "none";

  const start = (page - 1) * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);
  const totalPages = Math.ceil(total / PAGE_SIZE);

  tbody.innerHTML = slice.map(r => `
    <tr>
      <td class="td-date">${r.date || "—"}</td>
      <td class="td-ticker">${r.ticker}</td>
      <td class="td-company" title="${r.company}">${r.company}</td>
      <td class="td-sector"  title="${r.sector}">${r.sector || "—"}</td>
      <td class="td-industry" title="${r.industry}">${r.industry || "—"}</td>
      <td>${actionBadge(r.action)}</td>
      <td title="${r.analyst}">${r.analyst || "—"}</td>
      <td>
        <span style="color:var(--dim)">${r.rating_prev||"—"}</span>
        <span class="pt-arrow">→</span>
        <span>${r.rating_new||"—"}</span>
      </td>
      <td>${ptCell(r.pt_prev, null, false)}</td>
      <td>${ptCell(r.pt_new, r.pt_prev, true)}</td>
      <td>${ptChange(r.pt_prev, r.pt_new)}</td>
    </tr>
  `).join("");

  document.getElementById("page-info").textContent =
    `${start + 1}–${Math.min(start + PAGE_SIZE, total)} / ${total}`;
  document.getElementById("btn-prev").disabled = page <= 1;
  document.getElementById("btn-next").disabled = page >= totalPages;
}

// ── Event listeners ──
["search","filter-action","filter-sector","filter-pt"].forEach(id =>
  document.getElementById(id).addEventListener("input", applyFilters)
);

document.getElementById("btn-prev").addEventListener("click", () => { page--; render(); });
document.getElementById("btn-next").addEventListener("click", () => { page++; render(); });

document.querySelectorAll("th[data-col]").forEach(th => {
  th.addEventListener("click", () => {
    const col = th.dataset.col;
    if (sortCol === col) { sortAsc = !sortAsc; }
    else { sortCol = col; sortAsc = false; }
    document.querySelectorAll("th").forEach(t => t.classList.remove("sorted"));
    th.classList.add("sorted");
    const arrow = th.querySelector(".sort-arrow");
    if (arrow) arrow.textContent = sortAsc ? "↑" : "↓";
    applyFilters();
  });
});

// 自動リフレッシュ（1時間）
setInterval(loadData, 60 * 60 * 1000);

loadData();
</script>
</body>
</html>
