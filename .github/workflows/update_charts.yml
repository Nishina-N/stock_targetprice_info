name: Update Charts

on:
  schedule:
    - cron: '0 14 * * 1-5'   # 09:00 ET（市場開始）
    - cron: '0 17 * * 1-5'   # 12:00 ET（昼）
    - cron: '0 20 * * 1-5'   # 15:00 ET（市場終了前）
    - cron: '30 21 * * 1-5'  # 16:30 ET（終値確定後）
  workflow_dispatch:           # 手動実行も可

jobs:
  update-charts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance mplfinance matplotlib pandas

      - name: Generate charts
        run: python scripts/generate_charts.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/
          git diff --staged --quiet || git commit -m "chore: update charts $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push