name: Fetch Price Targets

on:
  schedule:
    - cron: '0 * * * *'   # 毎時0分 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch price targets
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python scripts/fetch_price_targets.py

      - name: Fetch earnings surprises
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python scripts/fetch_earnings_surprises.py

　　　 - name: Fetch insider trading
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python scripts/fetch_insider_trading.py


      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/earnings.json docs/insider.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update data.json [skip ci]"
            git push
          fi
